
<!DOCTYPE html>
<html>

    <title>Inkscape Output</title>
</head>
<body>
    <canvas id='canvas' width='1920' height='1080'></canvas>
    <script>
    var ctx = document.getElementById("canvas").getContext("2d");
    	
// #layer2

	ctx.lineTo(914.428650, 156.079520);
	ctx.lineTo(1153.094500, 214.262630);
	ctx.lineTo(1200.338900, 491.809260);
	ctx.lineTo(1153.614700, 769.355890);
	ctx.lineTo(693.100160, 750.829680);
	ctx.lineTo(617.219370, 460.627980);
	ctx.stroke();

    </script>
</body>
